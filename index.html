/* ─── UTILS ─── */
function calcularDias(f){if(!f)return 0;return Math.floor((Date.now()-new Date(f).getTime())/864e5)}

function obtenerColorSubfase(dias,subfase){
  const rules={REEMPLAZO:[90,60],SERVIDAS:[30,25],GESTACION:[114,110],VACIA:[10,5],MATERNIDAD:[28,21],LACTANCIA:[28,21],DESTETE:[5,3],DESCANSO:[7,5]};
  const r=rules[subfase];
  if(r){if(dias>r[0])return"red";if(dias>r[1])return"yellow";}
  return"green";
}
function obtenerColor(dias,fase){
  if(fase.includes("PRECEBO")){if(dias>49)return"red";if(dias>42)return"yellow"}
  if(fase.includes("LEVANTE")){if(dias>60)return"red";if(dias>50)return"yellow"}
  if(fase.includes("ENGORDE")){if(dias>90)return"red";if(dias>75)return"yellow"}
  return"green";
}

function calcularSubfase(id,regs){
  const records=regs.filter(r=>r[1]?.toString()===id);
  let lServ=-1,lParto=-1,lDest=-1,lConf=-1,lRet=-1,lCamb=-1,cambSf=null,tPartos=0,tServ=0;
  records.forEach((r,i)=>{
    const acc=r[2];
    if(acc==="SERVICIO"){lServ=i;tServ++}
    if(acc==="PARTO"){lParto=i;tPartos++}
    if(acc==="DESTETE")lDest=i;
    if(acc==="CONFIRMAR_GESTACION")lConf=i;
    if(acc==="RETORNO_VACIA")lRet=i;
    if(acc==="CAMBIAR_SUBFASE"){lCamb=i;const m=(r[5]||"").match(/Subfase:\s*(\w+)/);if(m)cambSf=m[1]}
  });
  const maxIdx=Math.max(lServ,lParto,lDest,lConf,lRet,lCamb);
  if(lCamb===maxIdx&&cambSf)return{subfase:cambSf,fechaSubfase:records[lCamb]?.[0]?.toString()||""};
  const lastRec=maxIdx>=0?records[maxIdx]:records[records.length-1];
  const fecha=lastRec?lastRec[0]?.toString()||"":"";
  if(lDest>lParto&&lDest>lServ)return{subfase:"DESCANSO",fechaSubfase:records[lDest]?.[0]?.toString()||fecha};
  if(lRet>lServ&&lRet>lParto)return{subfase:"VACIA",fechaSubfase:records[lRet]?.[0]?.toString()||fecha};
  if(lConf>lServ&&lConf>lParto)return{subfase:"GESTACION",fechaSubfase:records[lServ]?.[0]?.toString()||fecha};
  if(lServ>lParto&&lServ>lDest)return{subfase:"SERVIDAS",fechaSubfase:records[lServ]?.[0]?.toString()||fecha};
  if(lParto>lServ)return{subfase:"LACTANCIA",fechaSubfase:records[lParto]?.[0]?.toString()||fecha};
  if(tPartos===0&&tServ===0)return{subfase:"REEMPLAZO",fechaSubfase:fecha};
  return{subfase:"VACIA",fechaSubfase:fecha};
}

function procesarInventario(regs){
  const estados={};
  regs.forEach(r=>{const id=r[1]?.toString();const acc=r[2];const fase=r[3];const fecha=r[0];if(!id)return;
  if(!estados[id])estados[id]={id,piglets:0,subpuesto:r[12]?.toString()||"",fase:fase||"",chapeta:r[10]?.toString()||"",madre:r[7]?.toString()||"",activo:true,fechaFase:fecha};
  estados[id].ultimaAccion=acc;
  if(acc==="VENTA"||acc==="MUERTE"){estados[id].activo=false;estados[id].fechaFase=fecha}
  else{estados[id].activo=true;const nf=(fase||"").toUpperCase().trim().replace(/ /g,"_");if(estados[id].fase!==nf){estados[id].fase=nf;estados[id].fechaFase=fecha}estados[id].subpuesto=r[12]?.toString()||"";estados[id].chapeta=r[10]?.toString()||"";
  if(acc==="PARTO"){const m=(r[5]||"").match(/Vivos: (\d+)/);if(m)estados[id].piglets=parseInt(m[1]);estados[id].fechaFase=fecha}
  if(acc==="BAJA_LACTANCIA"){const m=(r[5]||"").match(/Cantidad: (\d+)/);if(m)estados[id].piglets=Math.max(0,estados[id].piglets-parseInt(m[1]))}
  if(acc==="DESTETE"){estados[id].piglets=0;estados[id].fechaFase=fecha}}});

  const todos=Object.values(estados).map(e=>{
    if(e.activo&&e.fase==="REPRODUCTIVA"){
      const{subfase,fechaSubfase}=calcularSubfase(e.id,regs);
      if(e.piglets>0){
        e.subfase="LACTANCIA";
        const partoRecs=regs.filter(r=>r[1]?.toString()===e.id&&r[2]==="PARTO");
        const lastP=partoRecs[partoRecs.length-1];
        e.fechaFase=lastP?lastP[0]?.toString()||fechaSubfase:fechaSubfase;
      }else{e.subfase=subfase;e.fechaFase=fechaSubfase}
      e.dias=calcularDias(e.fechaFase);e.color=obtenerColorSubfase(e.dias,e.subfase);
    }else{e.dias=calcularDias(e.fechaFase);e.color=e.activo?obtenerColor(e.dias,e.fase):"red"}
    return e;
  });
  return{activos:todos.filter(e=>e.activo),todos};
}

function buildDashboardData(inv){
  const data={total:0,piglets:0,phases:{}};
  inv.forEach(e=>{data.total++;data.piglets+=(e.piglets||0);if(!data.phases[e.fase])data.phases[e.fase]={count:0,alert:null,subpuestos:{}};data.phases[e.fase].count++;const sub=e.subpuesto||"Sin puesto";data.phases[e.fase].subpuestos[sub]=(data.phases[e.fase].subpuestos[sub]||0)+1;if(e.color==="red")data.phases[e.fase].alert="red";else if(e.color==="yellow"&&data.phases[e.fase].alert!=="red")data.phases[e.fase].alert="yellow"});
  return data;
}

function formatDateStr(date){
  const y=date.getFullYear(),m=String(date.getMonth()+1).padStart(2,"0"),d=String(date.getDate()).padStart(2,"0");
  return y+"-"+m+"-"+d;
}
function extractDateKey(raw){
  if(!raw)return"";
  const str=String(raw);
  const match=str.match(/(\d{4})-(\d{2})-(\d{2})/);
  if(match)return match[1]+"-"+match[2]+"-"+match[3];
  const parsed=new Date(str);
  if(!isNaN(parsed.getTime()))return formatDateStr(parsed);
  return"";
}

function DateInput({value,onChange,placeholder}){
  const formatToDisplay=(date)=>{if(!date||isNaN(date.getTime()))return"";const d=String(date.getDate()).padStart(2,"0"),m=String(date.getMonth()+1).padStart(2,"0"),y=date.getFullYear();return d+"/"+m+"/"+y};
  const parseFromDisplay=(str)=>{const clean=str.replace(/-/g,"/");const match=clean.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);if(!match)return undefined;const day=parseInt(match[1]),month=parseInt(match[2])-1,year=parseInt(match[3]);const date=new Date(year,month,day,12,0,0);if(isNaN(date.getTime())||date.getDate()!==day||date.getMonth()!==month||date.getFullYear()!==year)return undefined;return date};
  const autoFormat=(raw)=>{const digits=raw.replace(/\D/g,"");if(digits.length<=2)return digits;if(digits.length<=4)return digits.slice(0,2)+"/"+digits.slice(2);return digits.slice(0,2)+"/"+digits.slice(2,4)+"/"+digits.slice(4,8)};
  const[text,setText]=useState(formatToDisplay(value));
  const[error,setError]=useState(false);
  useEffect(()=>{setText(formatToDisplay(value));setError(false)},[value]);
  const handleChange=(e)=>{const formatted=autoFormat(e.target.value);setText(formatted);if(formatted.length===10){const parsed=parseFromDisplay(formatted);if(parsed){setError(false);onChange(parsed)}else{setError(true);onChange(undefined)}}else{setError(false);if(formatted.length===0)onChange(undefined)}};
  const handleBlur=()=>{if(text.length>0&&text.length<10)setError(true)};
  return React.createElement("div",{style:{position:"relative"}},
    React.createElement("input",{type:"text",inputMode:"numeric",value:text,onChange:handleChange,onBlur:handleBlur,placeholder:placeholder||"dd/mm/aaaa",maxLength:10,
      style:{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid "+(error?"var(--destructive)":"var(--input)"),background:"var(--bg)",color:"var(--fg)",fontSize:14,outline:"none"}}),
    error&&React.createElement("p",{style:{fontSize:10,color:"var(--destructive)",marginTop:2}},"Fecha inválida. Formato: dd/mm/aaaa")
  );
}
