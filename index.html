<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>🐷 Granja Pro</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#f5f2eb;--fg:#1a2e1a;
--card:#fff;--card-fg:#1a2e1a;
--primary:#2d6a4f;--primary-fg:#f5f2eb;
--secondary:#c77f32;--secondary-fg:#fff;
--muted:#e8e4db;--muted-fg:#6b7a6b;
--accent:#d4792a;--accent-fg:#fff;
--destructive:#dc2626;--destructive-fg:#fff;
--success:#2d8a56;--success-fg:#fff;
--warning:#d4a00a;--warning-fg:#3d2e0a;
--border:#d9d4ca;--input:#d9d4ca;
--radius:0.75rem;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--fg);-webkit-tap-highlight-color:transparent}
.gradient-farm{background:linear-gradient(135deg,var(--primary),#1a3d2a)}
.gradient-amber{background:linear-gradient(135deg,var(--secondary),var(--accent))}
.gradient-purple{background:linear-gradient(135deg,#5b2d8e,#7c3aed)}
input,select,textarea{font-family:inherit}
@keyframes fade-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse-alert{0%{transform:scale(1);box-shadow:0 0 0 0 rgba(220,38,38,.7)}70%{transform:scale(1.15);box-shadow:0 0 0 8px rgba(220,38,38,0)}100%{transform:scale(1);box-shadow:0 0 0 0 rgba(220,38,38,0)}}
.animate-fade-in{animation:fade-in .3s ease}
.animate-spin{animation:spin 1s linear infinite}
.animate-pulse-alert{animation:pulse-alert 2s infinite}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo}=React;

const FASES_DEFAULT=["SALA_SERVICIO","GESTACION","MATERNIDAD","PRECEBO","LEVANTE","ENGORDE","DESCANSO"];
const ACCION_CONFIG={
INGRESO:{icon:"🟢",label:"Ingreso"},SERVICIO:{icon:"💉",label:"Servicio"},
PARTO:{icon:"🐷",label:"Parto"},DESTETE:{icon:"🥣",label:"Destete"},
BAJA_LACTANCIA:{icon:"💀",label:"Baja Lechón"},TRASLADO:{icon:"🔵",label:"Traslado"},
VENTA:{icon:"💰",label:"Venta"},MUERTE:{icon:"🔴",label:"Muerte"},
OBSERVACION:{icon:"📝",label:"Observación"},
};

const URL_SCRIPT="https://script.google.com/macros/s/AKfycbzArhmRwQjTemkFY1xP2m0bMUNpEPMWpGoJzHftRYD_JpCbNtoUOrq7fDyzRe1mu6SW/exec";
function calcularDias(f){if(!f)return 0;return Math.floor((Date.now()-new Date(f).getTime())/864e5)}
function obtenerColor(dias,fase){
if(fase.includes("SALA_SERVICIO")){if(dias>30)return"red";if(dias>25)return"yellow"}
if(fase.includes("GESTACION")){if(dias>75)return"red";if(dias>70)return"yellow"}
if(fase.includes("MATERNIDAD")){if(dias>35)return"red";if(dias>30)return"yellow"}
if(fase.includes("DESCANSO")){if(dias>6)return"red";if(dias>4)return"yellow"}
if(fase.includes("PRECEBO")){if(dias>49)return"red";if(dias>42)return"yellow"}
return"green";
}
function procesarInventario(regs){
const estados={};
regs.forEach(r=>{const id=r[1]?.toString();const acc=r[2];const fase=r[3];const fecha=r[0];if(!id)return;
if(!estados[id])estados[id]={id,piglets:0,subpuesto:r[12]?.toString()||"",fase:fase||"",chapeta:r[10]?.toString()||"",madre:r[7]?.toString()||"",activo:true,fechaFase:fecha};
estados[id].ultimaAccion=acc;
if(acc==="VENTA"||acc==="MUERTE"){estados[id].activo=false;estados[id].fechaFase=fecha}
else{estados[id].activo=true;const nf=(fase||"").toUpperCase().trim().replace(/ /g,"_");if(estados[id].fase!==nf){estados[id].fase=nf;estados[id].fechaFase=fecha}estados[id].subpuesto=r[12]?.toString()||"";estados[id].chapeta=r[10]?.toString()||"";
if(acc==="PARTO"){const m=(r[5]||"").match(/Vivos: (\d+)/);if(m)estados[id].piglets=parseInt(m[1]);estados[id].fechaFase=fecha}
if(acc==="BAJA_LACTANCIA"){const m=(r[5]||"").match(/Cantidad: (\d+)/);if(m)estados[id].piglets=Math.max(0,estados[id].piglets-parseInt(m[1]))}
if(acc==="DESTETE"){estados[id].piglets=0;estados[id].fechaFase=fecha}}});
const todos=Object.values(estados).map(e=>{e.dias=calcularDias(e.fechaFase);e.color=e.activo?obtenerColor(e.dias,e.fase):"red";return e});
return{activos:todos.filter(e=>e.activo),todos};
}
function buildDashboardData(inv){
const data={total:0,piglets:0,phases:{}};
inv.forEach(e=>{data.total++;data.piglets+=(e.piglets||0);if(!data.phases[e.fase])data.phases[e.fase]={count:0,alert:null,subpuestos:{}};data.phases[e.fase].count++;const sub=e.subpuesto||"Sin puesto";data.phases[e.fase].subpuestos[sub]=(data.phases[e.fase].subpuestos[sub]||0)+1;if(e.color==="red")data.phases[e.fase].alert="red";else if(e.color==="yellow"&&data.phases[e.fase].alert!=="red")data.phases[e.fase].alert="yellow"});
return data;
}
async function fetchFarmData(){const r=await fetch(URL_SCRIPT);return r.json()}
async function enviarRegistro(d){await fetch(URL_SCRIPT,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(d)})}
async function enviarBatch(d){await fetch(URL_SCRIPT,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({tipo:"BATCH",...d})})}

const colorMap={green:"var(--success)",yellow:"var(--warning)",red:"var(--destructive)"};

function FarmHeader({searchValue,onSearch}){
return(<header style={{position:"sticky",top:0,zIndex:40,boxShadow:"0 4px 12px rgba(0,0,0,.15)"}} className="gradient-farm">
<div style={{maxWidth:480,margin:"0 auto",padding:"16px 16px 12px"}}>
<h1 style={{fontSize:20,fontWeight:700,color:"var(--primary-fg)",letterSpacing:1}}>🐷 Granja Pro</h1>
<div style={{marginTop:12,position:"relative"}}>
<span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"var(--muted-fg)"}}>🔍</span>
<input value={searchValue} onChange={e=>onSearch(e.target.value)} placeholder="Buscar por Tatuaje o Chapeta..." style={{width:"100%",padding:"10px 16px 10px 36px",borderRadius:20,border:"none",outline:"none",fontSize:14,background:"var(--card)",color:"var(--fg)"}}/>
</div></div></header>);
}

function BottomNav({active,onChange}){
const tabs=[{id:"dashboard",icon:"🏠",label:"Inicio"},{id:"registro",icon:"➕",label:"Registro"},{id:"reportes",icon:"📋",label:"Reportes"}];
return(<nav style={{position:"fixed",bottom:0,left:0,right:0,zIndex:50,background:"var(--card)",borderTop:"1px solid var(--border)",boxShadow:"0 -2px 10px rgba(0,0,0,.05)"}}>
<div style={{display:"flex",justifyContent:"space-around",alignItems:"center",padding:"8px 0",maxWidth:480,margin:"0 auto"}}>
{tabs.map(t=>(<button key={t.id} onClick={()=>onChange(t.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"6px 16px",borderRadius:8,border:"none",background:"transparent",cursor:"pointer",color:active===t.id?"var(--primary)":"var(--muted-fg)",fontWeight:active===t.id?700:400,fontSize:10}}><span style={{fontSize:22}}>{t.icon}</span><span>{t.label}</span></button>))}
</div></nav>);
}

function DashboardView({data,onPhaseClick,onSubpuestoClick,onPigletsClick}){
const[expanded,setExpanded]=useState(null);
return(<div className="animate-fade-in">
<div className="gradient-farm" style={{borderRadius:12,padding:20,textAlign:"center",boxShadow:"0 4px 15px rgba(0,0,0,.2)",marginBottom:12}}>
<p style={{fontSize:10,textTransform:"uppercase",letterSpacing:3,color:"rgba(255,255,255,.7)",fontWeight:600}}>Población Total</p>
<p style={{fontSize:48,fontWeight:800,color:"var(--primary-fg)",marginTop:4}}>{data.total+data.piglets}</p></div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
<div onClick={onPigletsClick} className="gradient-amber" style={{borderRadius:12,padding:16,textAlign:"center",boxShadow:"0 2px 8px rgba(0,0,0,.1)",cursor:"pointer"}}>
<p style={{fontSize:10,textTransform:"uppercase",letterSpacing:2,color:"rgba(255,255,255,.8)",fontWeight:600}}>Lechones Vivos</p>
<p style={{fontSize:28,fontWeight:700,color:"#fff",marginTop:4}}>{data.piglets}</p></div>
{Object.entries(data.phases).sort((a,b)=>a[0].localeCompare(b[0])).map(([fase,info])=>{
const isS=fase.includes("SALA_SERVICIO"),isExp=expanded===fase;
const subs=Object.entries(info.subpuestos).sort((a,b)=>a[0].localeCompare(b[0]));
const hasMS=subs.length>1||(subs.length===1&&subs[0][0]!=="Sin puesto");
return(<div key={fase} style={{position:"relative",borderRadius:12,boxShadow:"0 2px 8px rgba(0,0,0,.08)",gridColumn:isExp?"span 2":"span 1",background:isS?undefined:"var(--card)",border:isS?"none":"1px solid var(--border)"}} className={isS?"gradient-purple":undefined}>
{info.alert&&<span style={{position:"absolute",top:8,right:8,width:12,height:12,borderRadius:"50%",background:info.alert==="red"?"var(--destructive)":"var(--warning)",border:"2px solid var(--card)"}} className={info.alert==="red"?"animate-pulse-alert":""}/>}
<div onClick={()=>onPhaseClick(fase)} style={{padding:16,textAlign:"center",cursor:"pointer"}}>
<p style={{fontSize:10,textTransform:"uppercase",letterSpacing:2,fontWeight:600,color:isS?"rgba(255,255,255,.8)":"var(--muted-fg)"}}>{fase.replace(/_/g," ")}</p>
<p style={{fontSize:28,fontWeight:700,marginTop:4,color:isS?"#fff":"var(--card-fg)"}}>{info.count}</p></div>
{hasMS&&<button onClick={e=>{e.stopPropagation();setExpanded(expanded===fase?null:fase)}} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:4,fontSize:10,textTransform:"uppercase",letterSpacing:2,fontWeight:600,padding:"6px 0",background:"transparent",border:"none",borderTop:"1px solid "+(isS?"rgba(255,255,255,.2)":"var(--border)"),cursor:"pointer",color:isS?"rgba(255,255,255,.7)":"var(--muted-fg)"}}>📍 {subs.length} puestos {isExp?"▲":"▼"}</button>}
{isExp&&<div style={{padding:"0 12px 12px"}}>{subs.map(([sub,count])=><div key={sub} onClick={e=>{e.stopPropagation();onSubpuestoClick(fase,sub)}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",borderRadius:8,marginBottom:4,cursor:"pointer",background:isS?"rgba(255,255,255,.1)":"var(--muted)",fontSize:12}}><span style={{fontWeight:500}}>📍 {sub}</span><span style={{fontWeight:700,fontSize:14}}>{count}</span></div>)}</div>}
</div>);})}
</div></div>);
}

function SubpuestoCards({phase,animals,onSelect,onSelectAll,onBack}){
const groups=useMemo(()=>{const map={};animals.forEach(a=>{const k=a.subpuesto||"Sin puesto";if(!map[k])map[k]={count:0,alerts:0,warnings:0};map[k].count++;if(a.color==="red")map[k].alerts++;if(a.color==="yellow")map[k].warnings++});return Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0]))},[animals]);
return(<div className="animate-fade-in">
<button onClick={onBack} style={{display:"flex",alignItems:"center",gap:4,fontSize:14,fontWeight:600,color:"var(--primary)",marginBottom:12,background:"none",border:"none",cursor:"pointer"}}>← Volver</button>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
<h3 style={{fontSize:18,fontWeight:700}}>{phase.replace(/_/g," ")}</h3>
<span style={{fontSize:13,fontWeight:600,color:"var(--muted-fg)",background:"var(--muted)",padding:"4px 10px",borderRadius:20}}>{animals.length} total</span></div>
<button onClick={onSelectAll} style={{width:"100%",marginBottom:12,padding:12,borderRadius:12,background:"rgba(45,106,79,.1)",color:"var(--primary)",fontWeight:600,fontSize:14,border:"none",cursor:"pointer"}}>Ver todos ({animals.length})</button>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
{groups.map(([sub,info])=>(<div key={sub} onClick={()=>onSelect(sub)} style={{position:"relative",background:"var(--card)",borderRadius:12,padding:16,border:"1px solid var(--border)",boxShadow:"0 2px 6px rgba(0,0,0,.05)",cursor:"pointer"}}>
{info.alerts>0&&<span className="animate-pulse-alert" style={{position:"absolute",top:8,right:8,width:12,height:12,borderRadius:"50%",background:"var(--destructive)",border:"2px solid var(--card)"}}/>}
{info.alerts===0&&info.warnings>0&&<span style={{position:"absolute",top:8,right:8,width:12,height:12,borderRadius:"50%",background:"var(--warning)",border:"2px solid var(--card)"}}/>}
<div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}><span style={{fontSize:10,fontWeight:700,color:"var(--muted-fg)",textTransform:"uppercase",letterSpacing:1}}>📍 {sub}</span></div>
<p style={{fontSize:28,fontWeight:700,color:"var(--card-fg)"}}>{info.count}</p>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}><span style={{fontSize:10,color:"var(--muted-fg)"}}>animales</span><span style={{color:"var(--muted-fg)"}}>›</span></div>
</div>))}</div></div>);
}

function AnimalList({title,animals,onSelect,onBack}){
return(<div className="animate-fade-in">
<button onClick={onBack} style={{display:"flex",alignItems:"center",gap:4,fontSize:14,fontWeight:600,color:"var(--primary)",marginBottom:12,background:"none",border:"none",cursor:"pointer"}}>← Volver</button>
<h3 style={{fontSize:18,fontWeight:700,marginBottom:12}}>{title}</h3>
{animals.length===0?<p style={{textAlign:"center",color:"var(--muted-fg)",padding:"32px 0"}}>Sin animales en esta fase.</p>:
<div style={{display:"flex",flexDirection:"column",gap:8}}>
{animals.map(a=>{const inactive=!a.activo;const status=inactive?(a.ultimaAccion==="VENTA"?"💰 VENDIDO":"🔴 MUERTO"):`📍 ${a.subpuesto||"Sin puesto"} · ${a.fase.replace(/_/g," ")}`;
return(<div key={a.id} onClick={()=>onSelect(a.id)} style={{background:"var(--card)",borderRadius:8,padding:14,display:"flex",alignItems:"center",justifyContent:"space-between",borderLeft:`4px solid ${inactive?"var(--muted-fg)":colorMap[a.color]}`,boxShadow:"0 1px 4px rgba(0,0,0,.06)",cursor:"pointer",opacity:inactive?.7:1}}>
<div><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontWeight:700}}>ID: {a.id}</span>
{!inactive&&<span style={{width:10,height:10,borderRadius:"50%",background:colorMap[a.color],display:"inline-block"}}/>}
{inactive&&<span style={{fontSize:10,fontWeight:700,padding:"2px 6px",borderRadius:4,background:"var(--muted)",color:"var(--muted-fg)"}}>{a.ultimaAccion==="VENTA"?"VENDIDO":"MUERTO"}</span>}
</div><p style={{fontSize:12,color:"var(--muted-fg)",marginTop:2}}>{status}{!inactive&&a.dias>0&&` · ⏱️ ${a.dias}d`}{!inactive&&a.piglets>0&&` · 🐷 ${a.piglets}`}</p></div>
<span style={{color:"var(--muted-fg)"}}>›</span></div>);})}
</div>}</div>);
}

function AnimalDetail({animal,historial,allAnimals,onBack,onAction}){
const animalHistory=historial.filter(h=>h[1]?.toString()===animal.id).reverse().slice(0,20);
const sowStats=useMemo(()=>{
const records=historial.filter(h=>h[1]?.toString()===animal.id);
const partos=records.filter(r=>r[2]==="PARTO"),servicios=records.filter(r=>r[2]==="SERVICIO"),destetes=records.filter(r=>r[2]==="DESTETE"),bajas=records.filter(r=>r[2]==="BAJA_LACTANCIA");
let totalNV=0,totalNM=0,totalPN=0,totalH=0,totalM=0;const partoDetails=[];
partos.forEach(p=>{const n=p[5]||"";const mV=n.match(/Vivos:\s*(\d+)/),mMu=n.match(/Muertos:\s*(\d+)/),mP=n.match(/Peso Total:\s*([\d.]+)/),mH=n.match(/Hembras:\s*(\d+)/),mMa=n.match(/Machos:\s*(\d+)/),mPa=n.match(/Padre:\s*([^\s|]+)/);
const v=mV?parseInt(mV[1]):0,mu=mMu?parseInt(mMu[1]):0,pe=mP?parseFloat(mP[1]):0,h=mH?parseInt(mH[1]):0,ma=mMa?parseInt(mMa[1]):0,pa=mPa?mPa[1]:"";
totalNV+=v;totalNM+=mu;totalPN+=pe;totalH+=h;totalM+=ma;partoDetails.push({fecha:new Date(p[0]).toLocaleDateString(),vivos:v,muertos:mu,peso:pe,hembras:h,machos:ma,padre:pa})});
let totalBajas=0;bajas.forEach(b=>{const m=(b[5]||"").match(/Cantidad:\s*(\d+)/);if(m)totalBajas+=parseInt(m[1])});
const hijos=allAnimals.filter(a=>a.madre===animal.id);
const promV=partos.length>0?(totalNV/partos.length).toFixed(1):"0";const promP=totalNV>0?(totalPN/totalNV).toFixed(2):"0";
const mort=totalNV>0?(((totalBajas+totalNM)/(totalNV+totalNM))*100).toFixed(1):"0";
let score=50;if(partos.length>0)score+=partos.length*5;if(parseFloat(promV)>=10)score+=15;else if(parseFloat(promV)>=8)score+=10;if(parseFloat(mort)<10)score+=15;else if(parseFloat(mort)<20)score+=5;else score-=10;score=Math.min(100,Math.max(0,score));
return{partos:partos.length,servicios:servicios.length,destetes:destetes.length,totalNacidosVivos:totalNV,totalNacidosMuertos:totalNM,totalBajas,totalHembras:totalH,totalMachos:totalM,promVivos:promV,promPeso:promP,mortalidad:mort,score,partoDetails,hijos:hijos.length,hijosActivos:hijos.filter(a=>a.activo).length};
},[historial,allAnimals,animal.id]);

const isSow=sowStats.partos>0||sowStats.servicios>0||["SALA_SERVICIO","GESTACION","MATERNIDAD","DESCANSO"].includes(animal.fase);
const isInactive=!animal.activo;
const showParto=!isInactive&&animal.piglets===0;
const showDestete=!isInactive&&animal.piglets>0;
const scoreColor=sowStats.score>=70?"var(--success)":sowStats.score>=40?"var(--warning)":"var(--destructive)";
const scoreLabel=sowStats.score>=70?"Excelente":sowStats.score>=40?"Regular":"Bajo rendimiento";
const btn={border:"none",cursor:"pointer",borderRadius:8,fontWeight:600,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"10px 0",width:"100%"};

return(<div className="animate-fade-in">
<button onClick={onBack} style={{display:"flex",alignItems:"center",gap:4,fontSize:14,fontWeight:600,color:"var(--primary)",marginBottom:8,background:"none",border:"none",cursor:"pointer"}}>← Volver</button>

<div style={{background:"var(--card)",borderRadius:12,padding:20,boxShadow:"0 2px 10px rgba(0,0,0,.08)",border:"1px solid var(--border)",marginBottom:12}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<h2 style={{fontSize:24,fontWeight:800}}>ID: {animal.id}</h2>
<span style={{background:colorMap[animal.color],color:"#fff",fontSize:11,fontWeight:700,padding:"4px 12px",borderRadius:20}}>⏱️ {animal.dias} días</span></div>

{isInactive&&(<div style={{marginTop:12,padding:12,borderRadius:8,background:"rgba(220,38,38,.1)",border:"1px solid rgba(220,38,38,.2)",textAlign:"center"}}>
<p style={{fontSize:14,fontWeight:700,color:"var(--destructive)"}}>{animal.ultimaAccion==="VENTA"?"💰 VENDIDO":"🔴 MUERTO"} — No se pueden registrar acciones</p></div>)}

<div style={{marginTop:16,fontSize:14,lineHeight:2}}>
<p>📍 <b>Puesto:</b> {animal.subpuesto||"N/A"}</p><p>🏷️ <b>Chapeta:</b> {animal.chapeta||"N/A"}</p>
<p>👩‍👦 <b>Madre:</b> {animal.madre||"N/A"}</p><p>📋 <b>Fase:</b> {(animal.fase||"").replace(/_/g," ")||"N/A"}</p></div>

{!isInactive&&animal.piglets>0&&(<div style={{marginTop:12,display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(45,138,86,.1)",border:"1px solid rgba(45,138,86,.2)",borderRadius:8,padding:12}}>
<span style={{fontSize:14,fontWeight:700,color:"var(--success)"}}>🐷 {animal.piglets} Lechones Vivos</span>
<button onClick={()=>onAction(animal.id,"BAJA_LACTANCIA")} style={{...btn,width:"auto",padding:"4px 12px",background:"var(--destructive)",color:"#fff",fontSize:11}}>💀 Baja</button></div>)}

{!isInactive&&(<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:20}}>
<button onClick={()=>onAction(animal.id,"OBSERVACION")} style={{...btn,background:"var(--muted)",color:"var(--card-fg)"}}>📝 Nota</button>
<button onClick={()=>onAction(animal.id,"TRASLADO")} style={{...btn,background:"var(--primary)",color:"var(--primary-fg)"}}>🔄 Mover</button>
<button onClick={()=>onAction(animal.id,"SERVICIO")} style={{...btn,gridColumn:"span 2",color:"#fff"}} className="gradient-purple">💉 Inseminar</button>
{showParto&&<button onClick={()=>onAction(animal.id,"PARTO")} style={{...btn,gridColumn:"span 2",background:"var(--accent)",color:"var(--accent-fg)",padding:"12px 0",fontWeight:700,border:"2px solid var(--accent)"}}>🐷 Registrar Parto</button>}
{showDestete&&<button onClick={()=>onAction(animal.id,"DESTETE")} style={{...btn,gridColumn:"span 2",background:"var(--success)",color:"var(--success-fg)"}}>🥣 Registrar Destete</button>}
</div>)}
</div>

{isSow&&(<div style={{background:"var(--card)",borderRadius:12,padding:20,boxShadow:"0 2px 10px rgba(0,0,0,.08)",border:"1px solid var(--border)",marginBottom:12}}>

function RegistroForm({inventario,fasesExtra,prefillId="",prefillAccion="INGRESO",prefillAnimal=null,historial=[],onSuccess}){
const allFases=[...FASES_DEFAULT,...fasesExtra];
const[accion,setAccion]=useState(prefillAccion);const[tatuaje,setTatuaje]=useState(prefillId);
const[chapeta,setChapeta]=useState(prefillAnimal?.chapeta||"");const[peso,setPeso]=useState("");

const[padre,setPadre]=useState("");const[vivos,setVivos]=useState("");const[muertos,setMuertos]=useState("");
const[cantBaja,setCantBaja]=useState("1");const[causaBaja,setCausaBaja]=useState("");
const[destetados,setDestetados]=useState("");const[destLechones,setDestLechones]=useState("PRECEBO");

const[fechaEvento,setFechaEvento]=useState(new Date().toISOString().split("T")[0]);

const lastPeso=useMemo(()=>{if(!prefillAnimal||!historial.length)return"";const records=historial.filter(h=>h[1]?.toString()===prefillAnimal.id).reverse();for(const r of records){const n=r[5]||"";const m=n.match(/Peso:\s*([\d.]+)\s*kg/);if(m)return m[1];if(r[4]&&parseFloat(r[4])>0)return r[4].toString()}return""},[prefillAnimal,historial]);

const handleAccionChange=val=>{setAccion(val);if(val==="SERVICIO")setFase("SALA_SERVICIO");if(val==="PARTO")setFase("MATERNIDAD");
if(val==="DESTETE"){setFase("DESCANSO");setDestLechones("PRECEBO");const a=inventario.find(a=>a.id===tatuaje);if(a){setDestetados(String(a.piglets));setLechones(Array.from({length:a.piglets},(_,i)=>({tat:`${tatuaje}-${i+1}`,chap:"",peso:"",ok:true})))}}
if(val==="BAJA_LACTANCIA")setFase("MATERNIDAD")};

if(accion==="BAJA_LACTANCIA")fn=`BAJA LACTANCIA | Cantidad: ${cantBaja} | Causa: ${causaBaja||"Desconocida"} ${notas}`;

await enviarRegistro({tatuaje,chapeta,peso,accion,fase,subpuesto,notas:fn,inseminador,fecha:fechaEvento});
alert("✅ Registro guardado");setSaving(false);onSuccess()};

<div><label style={lbl}>Vivos</label><input type="number" value={vivos} onChange={e=>{setVivos(e.target.value);const n=parseInt(e.target.value)||0;setPartoLechones(Array.from({length:n},()=>({peso:"",sexo:"H"})))}} style={inp}/></div>
<div><label style={lbl}>Muertos</label><input type="number" value={muertos} onChange={e=>setMuertos(e.target.value)} style={inp}/></div></div>
<label style={lbl}>Semana de Nacimiento</label><input value={semanaNac} onChange={e=>setSemanaNac(e.target.value)} placeholder="Ej. S10" style={inp}/>
{partoLechones.length>0&&(<div style={{marginTop:12}}>
<p style={{fontSize:10,fontWeight:700,color:"var(--muted-fg)",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Peso individual</p>
{partoLechones.map((l,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:8,background:"var(--bg)",borderRadius:6,padding:6,border:"1px solid var(--border)",marginBottom:4}}>
<span style={{fontSize:12,color:"var(--muted-fg)",width:20,textAlign:"center",fontWeight:600}}>{i+1}</span>
<span style={{fontSize:10,color:"var(--muted-fg)",flexShrink:0}}>{tatuaje?`${semanaNac||"?"}-${tatuaje}-${i+1}`:`L${i+1}`}</span>
<input type="number" value={l.peso} onChange={e=>{const c=[...partoLechones];c[i]={...c[i],peso:e.target.value};setPartoLechones(c)}} placeholder="kg" style={{fontSize:12,padding:"4px 8px",borderRadius:4,border:"1px solid var(--input)",background:"var(--bg)",width:60,minWidth:0}}/>
<button type="button" onClick={()=>{const c=[...partoLechones];c[i]={...c[i],sexo:"H"};setPartoLechones(c)}} style={{fontSize:12,padding:"4px 8px",borderRadius:4,fontWeight:700,border:"none",cursor:"pointer",background:l.sexo==="H"?"#ec4899":"var(--muted)",color:l.sexo==="H"?"#fff":"var(--muted-fg)"}}>♀ H</button>
<button type="button" onClick={()=>{const c=[...partoLechones];c[i]={...c[i],sexo:"M"};setPartoLechones(c)}} style={{fontSize:12,padding:"4px 8px",borderRadius:4,fontWeight:700,border:"none",cursor:"pointer",background:l.sexo==="M"?"#3b82f6":"var(--muted)",color:l.sexo==="M"?"#fff":"var(--muted-fg)"}}>♂ M</button>
</div>))}
<div style={{marginTop:8,display:"flex",justifyContent:"space-between",fontSize:12,fontWeight:600}}>
<div style={{display:"flex",gap:12}}><span style={{color:"#ec4899"}}>♀ {partoLechones.filter(l=>l.sexo==="H").length}</span><span style={{color:"#3b82f6"}}>♂ {partoLechones.filter(l=>l.sexo==="M").length}</span></div>
<span style={{color:"var(--primary)"}}>Peso: {partoLechones.reduce((s,l)=>s+(parseFloat(l.peso)||0),0).toFixed(1)} kg</span></div></div>)}
</div>)}

{accion==="BAJA_LACTANCIA"&&(<div style={{marginTop:16,padding:16,borderRadius:8,background:"rgba(220,38,38,.1)",border:"1px solid rgba(220,38,38,.2)"}}><h4 style={{fontSize:14,fontWeight:700,color:"var(--destructive)",marginBottom:8}}>💀 Baja de Lechón</h4><label style={lbl}>Cantidad</label><input type="number" value={cantBaja} onChange={e=>setCantBaja(e.target.value)} style={inp}/><label style={lbl}>Causa</label><input value={causaBaja} onChange={e=>setCausaBaja(e.target.value)} placeholder="Ej. Aplastamiento" style={inp}/></div>)}

{accion==="DESTETE"&&(<div style={{marginTop:16,padding:16,borderRadius:8,background:"rgba(45,138,86,.1)",border:"1px solid rgba(45,138,86,.2)"}}>
<h4 style={{fontSize:14,fontWeight:700,color:"var(--success)",marginBottom:8}}>🥣 Movimiento de Lechones</h4>
{tatuaje&&<div style={{marginBottom:12,padding:8,borderRadius:8,background:"rgba(45,106,79,.1)",border:"1px solid rgba(45,106,79,.2)",fontSize:12}}><p style={{fontWeight:600,color:"var(--primary)"}}>🐷 Madre: {tatuaje}</p></div>}
<label style={lbl}>Cant. Destetados</label><input type="number" value={destetados} onChange={e=>handleDestetadosChange(e.target.value)} style={inp}/>
<label style={lbl}>Destino</label><select value={destLechones} onChange={e=>setDestLechones(e.target.value)} style={inp}>{allFases.map(f=><option key={f} value={f}>{f}</option>)}</select>
{lechones.length>0&&(<div style={{marginTop:12}}>
<div style={{display:"grid",gridTemplateColumns:"24px 1fr 1fr 60px 28px",gap:4,fontSize:10,fontWeight:700,color:"var(--muted-fg)"}}><span>#</span><span>ID</span><span>Chap</span><span>Peso</span><span>OK</span></div>
{lechones.map((l,i)=>(<div key={i} style={{display:"grid",gridTemplateColumns:"24px 1fr 1fr 60px 28px",gap:4,alignItems:"center",background:"var(--bg)",borderRadius:4,padding:4,border:"1px solid var(--border)",marginBottom:2}}>
<span style={{fontSize:12,textAlign:"center",color:"var(--muted-fg)"}}>{i+1}</span>
<input value={l.tat} onChange={e=>{const c=[...lechones];c[i]={...c[i],tat:e.target.value};setLechones(c)}} placeholder="ID" style={{fontSize:12,padding:"4px 6px",borderRadius:4,border:"1px solid var(--input)",background:"var(--bg)",minWidth:0}}/>
<input value={l.chap} onChange={e=>{const c=[...lechones];c[i]={...c[i],chap:e.target.value};setLechones(c)}} placeholder="N°" style={{fontSize:12,padding:"4px 6px",borderRadius:4,border:"1px solid var(--input)",background:"var(--bg)",minWidth:0}}/>
<input type="number" value={l.peso} onChange={e=>{const c=[...lechones];c[i]={...c[i],peso:e.target.value};setLechones(c)}} placeholder="kg" style={{fontSize:12,padding:"4px 6px",borderRadius:4,border:"1px solid var(--input)",background:"var(--bg)",minWidth:0}}/>
<input type="checkbox" checked={l.ok} onChange={e=>{const c=[...lechones];c[i]={...c[i],ok:e.target.checked};setLechones(c)}} style={{width:16,height:16,margin:"0 auto",cursor:"pointer"}}/>
</div>))}
{lechones.some(l=>l.peso)&&<div style={{marginTop:8,fontSize:12,fontWeight:600,color:"var(--success)",textAlign:"right"}}>Peso: {lechones.reduce((s,l)=>s+(parseFloat(l.peso)||0),0).toFixed(1)} kg</div>}
</div>)}</div>)}

{accion==="VENTA"&&(<div style={{marginTop:16,padding:16,borderRadius:8,background:"rgba(45,138,86,.1)",border:"1px solid rgba(45,138,86,.2)"}}><h4 style={{fontSize:14,fontWeight:700,color:"var(--success)",marginBottom:8}}>💰 Datos de Venta</h4><label style={lbl}>Comprador</label><input value={comprador} onChange={e=>setComprador(e.target.value)} placeholder="Nombre" style={inp}/><p style={{fontSize:12,color:"var(--muted-fg)",marginTop:8}}>Fecha de venta: <b>{fechaEvento}</b></p></div>)}

<label style={lbl}>Notas</label><input value={notas} onChange={e=>setNotas(e.target.value)} placeholder="Observaciones" style={inp}/>
<button onClick={handleSubmit} disabled={saving} style={{width:"100%",marginTop:24,padding:12,borderRadius:8,background:"var(--primary)",color:"var(--primary-fg)",fontWeight:700,fontSize:16,border:"none",cursor:"pointer",opacity:saving?.5:1}}>{saving?"Guardando...":"Guardar 💾"}</button>
</div>);
}

function App(){
const[currentPhase,setCurrentPhase]=useState("");const[tab,setTab]=useState("dashboard");const[dashView,setDashView]=useState("summary");
const[inventario,setInventario]=useState([]);const[todosAnimales,setTodosAnimales]=useState([]);const[historial,setHistorial]=useState([]);
const[fasesExtra,setFasesExtra]=useState([]);const[loading,setLoading]=useState(true);const[search,setSearch]=useState("");
const[listTitle,setListTitle]=useState("");const[listAnimals,setListAnimals]=useState([]);const[selectedAnimal,setSelectedAnimal]=useState(null);
const[prefillId,setPrefillId]=useState("");const[prefillAccion,setPrefillAccion]=useState("INGRESO");const[prefillAnimal,setPrefillAnimal]=useState(null);
const[filterPuesto,setFilterPuesto]=useState("");const[filterMadre,setFilterMadre]=useState("");

const loadData=useCallback(async()=>{setLoading(true);try{const data=await fetchFarmData();setHistorial(data.registros);const r=procesarInventario(data.registros);setInventario(r.activos);setTodosAnimales(r.todos);setFasesExtra(data.fases||[])}catch(e){console.error("Error:",e)}setLoading(false)},[]);
useEffect(()=>{loadData()},[loadData]);
const{subpuestos,madres}=useMemo(()=>{const s=new Set(),m=new Set();inventario.forEach(a=>{if(a.subpuesto)s.add(a.subpuesto);if(a.madre)m.add(a.madre)});return{subpuestos:[...s].sort(),madres:[...m].sort()}},[inventario]);
const filteredInv=useMemo(()=>inventario.filter(a=>{if(filterPuesto&&a.subpuesto!==filterPuesto)return false;if(filterMadre&&a.madre!==filterMadre)return false;return true}),[inventario,filterPuesto,filterMadre]);
const dashData=buildDashboardData(filteredInv);
const handlePhaseClick=p=>{setCurrentPhase(p);setListTitle(p.replace(/_/g," "));setDashView("subpuestos")};
const handleSubpuestoClick=(p,s)=>{const sub=s==="Sin puesto"?"":s;setListTitle(`${p.replace(/_/g," ")} · 📍 ${s}`);setListAnimals(filteredInv.filter(a=>a.fase===p&&(a.subpuesto||"")===(sub||"")));setDashView("list")};
const handlePigletsClick=()=>{setListTitle("Lechones");setListAnimals(filteredInv.filter(a=>a.piglets>0));setDashView("list")};
const handleSelectAnimal=id=>{const a=todosAnimales.find(x=>x.id===id);if(a){setSelectedAnimal(a);setDashView("detail")}};
const handleAction=(id,accion)=>{setPrefillId(id);setPrefillAccion(accion);setPrefillAnimal(todosAnimales.find(a=>a.id===id)||null);setTab("registro")};
const handleSearch=val=>{setSearch(val);if(!val.trim()){setDashView("summary");return}const u=val.toUpperCase();setListTitle("Resultados");setListAnimals(todosAnimales.filter(a=>a.id.toString().toUpperCase().includes(u)||(a.chapeta&&a.chapeta.toString().toUpperCase().includes(u))));setDashView("list")};
const handleTabChange=t=>{setTab(t);if(t==="dashboard")setDashView("summary");if(t==="registro"){setPrefillId("");setPrefillAccion("INGRESO");setPrefillAnimal(null)}};

return(<div style={{minHeight:"100vh",background:"var(--bg)",paddingBottom:80}}>
<FarmHeader searchValue={search} onSearch={handleSearch}/>
<main style={{maxWidth:480,margin:"0 auto",padding:16}}>
{tab==="dashboard"&&<>{loading?<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"80px 0"}}><div style={{width:40,height:40,border:"4px solid var(--primary)",borderTopColor:"transparent",borderRadius:"50%"}} className="animate-spin"/><p style={{marginTop:12,fontSize:14,color:"var(--muted-fg)"}}>Sincronizando...</p></div>:<>
{dashView==="summary"&&<>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
<div><label style={{fontSize:9,fontWeight:700,color:"var(--muted-fg)",textTransform:"uppercase",letterSpacing:1}}>📍 Puesto</label><select value={filterPuesto} onChange={e=>setFilterPuesto(e.target.value)} style={{width:"100%",padding:"6px 8px",borderRadius:8,border:"1px solid var(--input)",background:"var(--card)",color:"var(--fg)",fontSize:12}}><option value="">Todos</option>{subpuestos.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
<div><label style={{fontSize:9,fontWeight:700,color:"var(--muted-fg)",textTransform:"uppercase",letterSpacing:1}}>👩‍👦 Madre</label><select value={filterMadre} onChange={e=>setFilterMadre(e.target.value)} style={{width:"100%",padding:"6px 8px",borderRadius:8,border:"1px solid var(--input)",background:"var(--card)",color:"var(--fg)",fontSize:12}}><option value="">Todas</option>{madres.map(m=><option key={m} value={m}>{m}</option>)}</select></div></div>
{(filterPuesto||filterMadre)&&<button onClick={()=>{setFilterPuesto("");setFilterMadre("")}} style={{fontSize:12,color:"var(--primary)",fontWeight:600,marginBottom:12,background:"none",border:"none",cursor:"pointer"}}>✕ Limpiar filtros</button>}
<DashboardView data={dashData} onPhaseClick={handlePhaseClick} onSubpuestoClick={handleSubpuestoClick} onPigletsClick={handlePigletsClick}/></>}
{dashView==="subpuestos"&&<SubpuestoCards phase={currentPhase} animals={filteredInv.filter(a=>a.fase===currentPhase)} onSelect={s=>handleSubpuestoClick(currentPhase,s)} onSelectAll={()=>{setListTitle(currentPhase.replace(/_/g," "));setListAnimals(filteredInv.filter(a=>a.fase===currentPhase));setDashView("list")}} onBack={()=>setDashView("summary")}/>}
{dashView==="list"&&<AnimalList title={listTitle} animals={listAnimals} onSelect={handleSelectAnimal} onBack={()=>{if(currentPhase)setDashView("subpuestos");else{setDashView("summary");setSearch("")}}}/>}
{dashView==="detail"&&selectedAnimal&&<AnimalDetail animal={selectedAnimal} historial={historial} allAnimals={todosAnimales} onBack={()=>setDashView("list")} onAction={handleAction}/>}
</>}</>}
{tab==="registro"&&<RegistroForm inventario={inventario} fasesExtra={fasesExtra} prefillId={prefillId} prefillAccion={prefillAccion} prefillAnimal={prefillAnimal} historial={historial} onSuccess={()=>{loadData();handleTabChange("dashboard")}}/>}
{tab==="reportes"&&<ReportsView historial={historial} search={search} onSelectAnimal={id=>{const a=todosAnimales.find(x=>x.id===id);if(a){setSelectedAnimal(a);setTab("dashboard");setDashView("detail")}}}/>}
</main>
<BottomNav active={tab} onChange={handleTabChange}/>
</div>);
}
ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
</body>
</html>
