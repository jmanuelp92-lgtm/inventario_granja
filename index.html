const URL_SCRIPT="https://script.google.com/macros/s/AKfycbxnE3BnJ-e6JnkQGTcRgYy6dTfZ7Qyr9aNaGiNFZA6LBs80yy8DTUKLw_do6reHaKyqSw/exec";

/* ─── OFFLINE & OPTIMISTIC SYNC SYSTEM ─── */
const CACHE_KEY = "granja_pro_cache";
const QUEUE_KEY = "granja_pro_queue";

function getQueue() { return JSON.parse(localStorage.getItem(QUEUE_KEY)||'[]'); }
function setQueue(q) { localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); window.dispatchEvent(new Event('offline_queue_changed')); }

async function fetchFarmData(){
  try{
    if(!navigator.onLine) throw new Error("Offline");
    const r=await fetch(URL_SCRIPT+"?t="+Date.now(),{cache:"no-store"});
    const data=await r.json();
    localStorage.setItem(CACHE_KEY, JSON.stringify(data));
    return data;
  }catch(e){
    const cached=localStorage.getItem(CACHE_KEY);
    if(cached) return JSON.parse(cached);
    return {registros:[], fases:[]};
  }
}

async function enviarRegistro(d){
  const q = getQueue(); 
  q.push({id:Date.now() + Math.random(), tipo:'registro', data:d}); 
  setQueue(q);
  window.dispatchEvent(new CustomEvent('optimistic_save', {detail: d}));
  syncQueue();
  return {ok:true};
}

async function enviarBatch(d){
  const q = getQueue(); 
  q.push({id:Date.now() + Math.random(), tipo:'batch', data:d}); 
  setQueue(q);
  window.dispatchEvent(new CustomEvent('optimistic_batch', {detail: d}));
  syncQueue();
  return {ok:true};
}

let isSyncing = false;
async function syncQueue() {
  if(!navigator.onLine || isSyncing) return false;
  
  isSyncing = true;
  window.dispatchEvent(new Event('sync_started'));
  
  let somethingSynced = false;
  
  // Usamos un bucle "while" robusto: siempre revisa si hay tareas nuevas que entraron durante la ejecución.
  while (true) {
    let currentQ = getQueue();
    if (currentQ.length === 0) break;
    
    let item = currentQ[0]; 
    try {
      const body = item.tipo === 'batch' ? JSON.stringify({tipo:"BATCH", ...item.data}) : JSON.stringify(item.data);
      const res = await fetch(URL_SCRIPT,{method:"POST",redirect:"follow",headers:{"Content-Type":"text/plain;charset=utf-8"},body});
      if(!res.ok) throw new Error("Sync failed");
      
      // Borrar la tarea completada de la cola
      let updatedQ = getQueue();
      updatedQ = updatedQ.filter(x => x.id !== item.id);
      setQueue(updatedQ);
      somethingSynced = true;
    } catch(e) {
      console.error("Fallo red. Pausando sincronización", e);
      break; 
    }
  }
  
  isSyncing = false;
  window.dispatchEvent(new Event('sync_ended'));
  
  if (somethingSynced && getQueue().length === 0) {
     window.dispatchEvent(new Event('sync_completed_all'));
  }
  return true;
}

/* ─── UTILS ─── */
function calcularDias(f){if(!f)return 0;return Math.floor((Date.now()-new Date(f).getTime())/864e5)}

function obtenerColorSubfase(dias,subfase){
  const rules={REEMPLAZO:[90,60],SERVIDAS:[30,25],GESTACION:[114,110],VACIA:[10,5],MATERNIDAD:[28,21],LACTANCIA:[28,21],DESTETE:[5,3],DESCANSO:[7,5]};
  const r=rules[subfase];
  if(r){if(dias>r[0])return"red";if(dias>r[1])return"yellow";}
  return"green";
}
function obtenerColor(dias,fase){
  if(fase.includes("PRECEBO")){if(dias>49)return"red";if(dias>42)return"yellow"}
  if(fase.includes("LEVANTE")){if(dias>60)return"red";if(dias>50)return"yellow"}
  if(fase.includes("ENGORDE")){if(dias>90)return"red";if(dias>75)return"yellow"}
  return"green";
}

function calcularSubfase(id,regs){
  const records=regs.filter(r=>r[1]?.toString()===id);
  let lServ=-1,lParto=-1,lDest=-1,lConf=-1,lRet=-1,lCamb=-1,cambSf=null,tPartos=0,tServ=0;
  records.forEach((r,i)=>{
    const acc=r[2];
    if(acc==="SERVICIO"){lServ=i;tServ++}
    if(acc==="PARTO"){lParto=i;tPartos++}
    if(acc==="DESTETE")lDest=i;
    if(acc==="CONFIRMAR_GESTACION")lConf=i;
    if(acc==="RETORNO_VACIA")lRet=i;
    if(acc==="CAMBIAR_SUBFASE"){lCamb=i;const m=(r[5]||"").match(/Subfase:\s*(\w+)/);if(m)cambSf=m[1]}
  });
  const maxIdx=Math.max(lServ,lParto,lDest,lConf,lRet,lCamb);
  if(lCamb===maxIdx&&cambSf)return{subfase:cambSf,fechaSubfase:records[lCamb]?.[0]?.toString()||""};
  const lastRec=maxIdx>=0?records[maxIdx]:records[records.length-1];
  const fecha=lastRec?lastRec[0]?.toString()||"":"";
  if(lDest>lParto&&lDest>lServ)return{subfase:"DESCANSO",fechaSubfase:records[lDest]?.[0]?.toString()||fecha};
  if(lRet>lServ&&lRet>lParto)return{subfase:"VACIA",fechaSubfase:records[lRet]?.[0]?.toString()||fecha};
  if(lConf>lServ&&lConf>lParto)return{subfase:"GESTACION",fechaSubfase:records[lServ]?.[0]?.toString()||fecha};
  if(lServ>lParto&&lServ>lDest)return{subfase:"SERVIDAS",fechaSubfase:records[lServ]?.[0]?.toString()||fecha};
  if(lParto>lServ)return{subfase:"LACTANCIA",fechaSubfase:records[lParto]?.[0]?.toString()||fecha};
  if(tPartos===0&&tServ===0)return{subfase:"REEMPLAZO",fechaSubfase:fecha};
  return{subfase:"VACIA",fechaSubfase:fecha};
}

function procesarInventario(regs){
  if(!regs||!regs.length) return {activos:[], todos:[]};
  const estados={};
  regs.forEach(r=>{const id=r[1]?.toString();const acc=r[2];const fase=r[3];const fecha=r[0];if(!id)return;
  if(!estados[id])estados[id]={id,piglets:0,subpuesto:r[12]?.toString()||"",fase:fase||"",chapeta:r[10]?.toString()||"",madre:r[7]?.toString()||"",activo:true,fechaFase:fecha};
  estados[id].ultimaAccion=acc;
  if(acc==="VENTA"||acc==="MUERTE"){estados[id].activo=false;estados[id].fechaFase=fecha}
  else{estados[id].activo=true;const nf=(fase||"").toUpperCase().trim().replace(/ /g,"_");if(estados[id].fase!==nf){estados[id].fase=nf;estados[id].fechaFase=fecha}estados[id].subpuesto=r[12]?.toString()||"";estados[id].chapeta=r[10]?.toString()||"";
  if(acc==="PARTO"){const m=(r[5]||"").match(/Vivos: (\d+)/);if(m)estados[id].piglets=parseInt(m[1]);estados[id].fechaFase=fecha}
  if(acc==="BAJA_LACTANCIA"){const m=(r[5]||"").match(/Cantidad: (\d+)/);if(m)estados[id].piglets=Math.max(0,estados[id].piglets-parseInt(m[1]))}
  if(acc==="DESTETE"){estados[id].piglets=0;estados[id].fechaFase=fecha}}});

  const todos=Object.values(estados).map(e=>{
    if(e.activo&&e.fase==="REPRODUCTIVA"){
      const{subfase,fechaSubfase}=calcularSubfase(e.id,regs);
      if(e.piglets>0){
        e.subfase="LACTANCIA";
        const partoRecs=regs.filter(r=>r[1]?.toString()===e.id&&r[2]==="PARTO");
        const lastP=partoRecs[partoRecs.length-1];
        e.fechaFase=lastP?lastP[0]?.toString()||fechaSubfase:fechaSubfase;
      }else{e.subfase=subfase;e.fechaFase=fechaSubfase}
      e.dias=calcularDias(e.fechaFase);e.color=obtenerColorSubfase(e.dias,e.subfase);
    }else{e.dias=calcularDias(e.fechaFase);e.color=e.activo?obtenerColor(e.dias,e.fase):"red"}
    return e;
  });
  return{activos:todos.filter(e=>e.activo),todos};
}

function buildDashboardData(inv){
  const data={total:0,piglets:0,phases:{}};
  inv.forEach(e=>{data.total++;data.piglets+=(e.piglets||0);if(!data.phases[e.fase])data.phases[e.fase]={count:0,alert:null,subpuestos:{}};data.phases[e.fase].count++;const sub=e.subpuesto||"Sin puesto";data.phases[e.fase].subpuestos[sub]=(data.phases[e.fase].subpuestos[sub]||0)+1;if(e.color==="red")data.phases[e.fase].alert="red";else if(e.color==="yellow"&&data.phases[e.fase].alert!=="red")data.phases[e.fase].alert="yellow"});
  return data;
}

const colorMap={green:"var(--success)",yellow:"var(--warning)",red:"var(--destructive)"};

function formatDateStr(date){
  const y=date.getFullYear(),m=String(date.getMonth()+1).padStart(2,"0"),d=String(date.getDate()).padStart(2,"0");
  return y+"-"+m+"-"+d;
}
function extractDateKey(raw){
  if(!raw)return"";
  const str=String(raw);
  const match=str.match(/(\d{4})-(\d{2})-(\d{2})/);
  if(match)return match[1]+"-"+match[2]+"-"+match[3];
  const parsed=new Date(str);
  if(!isNaN(parsed.getTime()))return formatDateStr(parsed);
  return"";
}
function dateKeyToLabel(key){if(!key)return"";const[y,m,d]=key.split("-");return d+"/"+m+"/"+y}
function toAppsScriptDate(key){return key?key+"T12:00:00":""}

function parseVacunaTypeFromNotas(notasRaw){
  const notas=String(notasRaw||"");
  const m=notas.match(/Tipo:\s*([A-Z_]+)/i);
  const raw=m?.[1]?.toUpperCase().trim();
  if(!raw)return null;
  return VACUNA_ORDER.includes(raw)?raw:null;
}

function getVacunaRecords(animalId,historial){
  const result={};
  const registrosVacuna=historial
    .filter(r=>r[1]?.toString()===animalId&&r[2]==="VACUNA")
    .sort((a,b)=>new Date(String(a[0])).getTime()-new Date(String(b[0])).getTime());
  registrosVacuna.forEach(r=>{
    const fecha=extractDateKey(r[0]);
    if(!fecha)return;
    const tipoExplicito=parseVacunaTypeFromNotas(r[5]);
    if(tipoExplicito){result[tipoExplicito]=fecha;return}
    const siguiente=VACUNA_ORDER.find(key=>!result[key]);
    if(siguiente)result[siguiente]=fecha;
  });
  return result;
}

function calcFechaProgramada(vacunaItem,fechaNacimiento,vacunasAplicadas){
  if(vacunaItem.diasDesdeNacimiento&&fechaNacimiento){
    const d=new Date(fechaNacimiento);d.setDate(d.getDate()+vacunaItem.diasDesdeNacimiento);
    return formatDateStr(d);
  }
  if(vacunaItem.diasDesdeVacunaAnterior){
    const prev=vacunasAplicadas[vacunaItem.diasDesdeVacunaAnterior.vacuna];
    if(prev){const d=new Date(prev);d.setDate(d.getDate()+vacunaItem.diasDesdeVacunaAnterior.dias);return formatDateStr(d)}
  }
  return"";
}

/* ─── DATE INPUT ─── */
function DateInput({value,onChange,placeholder}){
  const formatToDisplay=(date)=>{if(!date||isNaN(date.getTime()))return"";const d=String(date.getDate()).padStart(2,"0"),m=String(date.getMonth()+1).padStart(2,"0"),y=date.getFullYear();return d+"/"+m+"/"+y};
  const parseFromDisplay=(str)=>{const clean=str.replace(/-/g,"/");const match=clean.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);if(!match)return undefined;const day=parseInt(match[1]),month=parseInt(match[2])-1,year=parseInt(match[3]);const date=new Date(year,month,day,12,0,0);if(isNaN(date.getTime())||date.getDate()!==day||date.getMonth()!==month||date.getFullYear()!==year)return undefined;return date};
  const autoFormat=(raw)=>{const digits=raw.replace(/\D/g,"");if(digits.length<=2)return digits;if(digits.length<=4)return digits.slice(0,2)+"/"+digits.slice(2);return digits.slice(0,2)+"/"+digits.slice(2,4)+"/"+digits.slice(4,8)};
  const[text,setText]=useState(formatToDisplay(value));
  const[error,setError]=useState(false);
  useEffect(()=>{setText(formatToDisplay(value));setError(false)},[value]);
  const handleChange=(e)=>{const formatted=autoFormat(e.target.value);setText(formatted);if(formatted.length===10){const parsed=parseFromDisplay(formatted);if(parsed){setError(false);onChange(parsed)}else{setError(true);onChange(undefined)}}else{setError(false);if(formatted.length===0)onChange(undefined)}};
  const handleBlur=()=>{if(text.length>0&&text.length<10)setError(true)};
  return React.createElement("div",{style:{position:"relative"}},
    React.createElement("input",{type:"text",inputMode:"numeric",value:text,onChange:handleChange,onBlur:handleBlur,placeholder:placeholder||"dd/mm/aaaa",maxLength:10,
      style:{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid "+(error?"var(--destructive)":"var(--input)"),background:"var(--bg)",color:"var(--fg)",fontSize:14,outline:"none"}}),
    error&&React.createElement("p",{style:{fontSize:10,color:"var(--destructive)",marginTop:2}},"Fecha inválida. Formato: dd/mm/aaaa")
  );
}

/* ─── APP ─── */
function App(){
  const[tab,setTab]=useState("dashboard");
  const[dashView,setDashView]=useState("summary");
  const[inventario,setInventario]=useState([]);
  const[todosAnimales,setTodosAnimales]=useState([]);
  const[historial,setHistorial]=useState([]);
  const[fasesExtra,setFasesExtra]=useState([]);
  const[loading,setLoading]=useState(true);
  const[search,setSearch]=useState("");
  const[currentPhase,setCurrentPhase]=useState("");
  const[listTitle,setListTitle]=useState("");
  const[listAnimals,setListAnimals]=useState([]);
  const[selectedAnimal,setSelectedAnimal]=useState(null);
  const[prefillId,setPrefillId]=useState("");
  const[prefillAccion,setPrefillAccion]=useState("INGRESO");
  const[prefillAnimal,setPrefillAnimal]=useState(null);
  const[filterPuesto,setFilterPuesto]=useState("");
  const[filterMadre,setFilterMadre]=useState("");

  const[isOnline,setIsOnline]=useState(navigator.onLine);
  const[queueCount,setQueueCount]=useState(getQueue().length);
  const[syncing,setSyncing]=useState(false);
  const[deferredPrompt,setDeferredPrompt]=useState(null);

  const loadData=useCallback(async(background=false)=>{
    const cachedStr = localStorage.getItem(CACHE_KEY);
    let hasCache = false;
    if(cachedStr){
      try{
        const data = JSON.parse(cachedStr);
        setHistorial(data.registros || []);
        const result = procesarInventario(data.registros || []);
        setInventario(result.activos);
        setTodosAnimales(result.todos);
        setFasesExtra(data.fases || []);
        hasCache = true;
      }catch(e){}
    }

    if(!background && !hasCache) setLoading(true);
    else setLoading(false);

    if(navigator.onLine){
      if(hasCache && !background) setSyncing(true);
      try{
        const r = await fetch(URL_SCRIPT+"?t="+Date.now(),{cache:"no-store"});
        if(!r.ok) throw new Error("Network error");
        const data = await r.json();
        localStorage.setItem(CACHE_KEY, JSON.stringify(data));
        
        setHistorial(data.registros);
        const result = procesarInventario(data.registros);
        setInventario(result.activos);
        setTodosAnimales(result.todos);
        setFasesExtra(data.fases || []);
      }catch(e){
        console.error("Fallo fetch de fondo", e);
      }
      setSyncing(false);
      setLoading(false);
    }
  },[]);

  useEffect(()=>{
    loadData();

    const handleOnline=()=>{ setIsOnline(true); syncQueue(); };
    const handleOffline=()=>setIsOnline(false);
    const handleQueueChange=()=>setQueueCount(getQueue().length);
    const handleSyncStart=()=>setSyncing(true);
    const handleSyncEnd=()=>setSyncing(false);
    const handleSyncAllDone=()=>loadData(true);

    const handleOptimisticSave=(e)=>{
      const d = e.detail;
      setHistorial(prev=>{
        const next = [...prev, [
          d.fecha || new Date().toISOString(),
          d.tatuaje || "",
          d.accion || "",
          d.fase || "",
          "",
          d.notas || "",
          "",
          d.madre || "",
          "",
          "",
          d.chapeta || "",
          "",
          d.subpuesto || ""
        ]];
        const result = procesarInventario(next);
        setInventario(result.activos);
        setTodosAnimales(result.todos);
        return next;
      });
    };

    const handleOptimisticBatch=(e)=>{
      const {comun, animales} = e.detail;
      setHistorial(prev=>{
        const next = [...prev];
        animales.forEach(a=>{
           next.push([
             comun.fecha || new Date().toISOString(),
             a.tatuaje || "",
             comun.accion || "",
             comun.fase || "",
             "",
             a.notas || "",
             "",
             comun.madre || "",
             "",
             "",
             a.chapeta || "",
             "",
             comun.subpuesto || ""
           ]);
        });
        const result = procesarInventario(next);
        setInventario(result.activos);
        setTodosAnimales(result.todos);
        return next;
      });
    };

    const handleBeforeInstallPrompt = (e) => {
      e.preventDefault();
      setDeferredPrompt(e);
    };

    window.addEventListener('online', handleOnline);
    window.addEventListener('offline', handleOffline);
    window.addEventListener('offline_queue_changed', handleQueueChange);
    window.addEventListener('sync_started', handleSyncStart);
    window.addEventListener('sync_ended', handleSyncEnd);
    window.addEventListener('sync_completed_all', handleSyncAllDone);
    window.addEventListener('optimistic_save', handleOptimisticSave);
    window.addEventListener('optimistic_batch', handleOptimisticBatch);
    window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);

    if(navigator.onLine && getQueue().length > 0) syncQueue();

    return ()=>{
      window.removeEventListener('online', handleOnline);
      window.removeEventListener('offline', handleOffline);
      window.removeEventListener('offline_queue_changed', handleQueueChange);
      window.removeEventListener('sync_started', handleSyncStart);
      window.removeEventListener('sync_ended', handleSyncEnd);
      window.removeEventListener('sync_completed_all', handleSyncAllDone);
      window.removeEventListener('optimistic_save', handleOptimisticSave);
      window.removeEventListener('optimistic_batch', handleOptimisticBatch);
      window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
    };
  },[loadData]);

  const handleInstallClick = async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') {
      setDeferredPrompt(null);
    }
  };

  const{subpuestos,madres}=useMemo(()=>{const s=new Set(),m=new Set();inventario.forEach(a=>{if(a.subpuesto)s.add(a.subpuesto);if(a.madre)m.add(a.madre)});return{subpuestos:[...s].sort(),madres:[...m].sort()}},[inventario]);
  const filteredInv=useMemo(()=>inventario.filter(a=>{if(filterPuesto&&a.subpuesto!==filterPuesto)return false;if(filterMadre&&a.madre!==filterMadre)return false;return true}),[inventario,filterPuesto,filterMadre]);
  const dashboardData=buildDashboardData(filteredInv);

  const handlePhaseClick=phase=>{setCurrentPhase(phase);setListTitle(phase.replace(/_/g," "));setDashView("subpuestos")};
  const handleSubpuestoClick=(phase,subpuesto)=>{const sub=subpuesto==="Sin puesto"?"":subpuesto;setListTitle(phase.replace(/_/g," ")+" · 📍 "+subpuesto);setListAnimals(filteredInv.filter(a=>a.fase===phase&&(a.subpuesto||"")===(sub||"")));setDashView("list")};
  const handleSubfaseClick=subfase=>{const labels={REEMPLAZO:"🔄 Reemplazo",SERVIDAS:"💉 Servidas",GESTACION:"🤰 Gestación",VACIA:"⭕ Vacía",MATERNIDAD:"🏥 Maternidad",LACTANCIA:"🍼 Lactancia",DESTETE:"🥣 Destete",DESCANSO:"😴 Descanso"};setListTitle("REPRODUCTIVA · "+(labels[subfase]||subfase));setListAnimals(filteredInv.filter(a=>a.fase==="REPRODUCTIVA"&&a.subfase===subfase));setDashView("list")};
  const handlePigletsClick=()=>{setListTitle("Lechones");setListAnimals(filteredInv.filter(a=>a.piglets>0));setDashView("list")};
  const handleSelectAnimal=id=>{const a=todosAnimales.find(x=>x.id===id);if(a){setSelectedAnimal(a);setDashView("detail")}};

  const getMadurez=useCallback(id=>{const partos=historial.filter(h=>h[1]?.toString()===id&&h[2]==="PARTO").length;if(partos===0)return"NULIPARAS";if(partos===1)return"PRIMIPARAS";if(partos===2)return"MULTIPARAS";return"MULTIPARAS +"+partos},[historial]);

  const handleAction=(id,accion)=>{setPrefillId(id);setPrefillAccion(accion);const a=todosAnimales.find(x=>x.id===id)||null;setPrefillAnimal(a);setTab("registro")};
  
  const handleSearch=val=>{
    setSearch(val);
    if(!val.trim()){
      if(tab==="dashboard") setDashView("summary");
      return;
    }
    const upper=val.toUpperCase();
    
    const matchingIds = new Set();
    historial.forEach(h => {
      const notas = (h[5]||"").toString().toUpperCase();
      const accion = (h[2]||"").toString().toUpperCase();
      if(notas.includes(upper) || accion.includes(upper)){
        if(h[1]) matchingIds.add(h[1].toString());
      }
    });

    const filtered=todosAnimales.filter(a=>{
      const madurez=a.fase==="REPRODUCTIVA"?getMadurez(a.id):"";
      return a.id.toString().toUpperCase().includes(upper)||
             (a.chapeta&&a.chapeta.toString().toUpperCase().includes(upper))||
             madurez.toUpperCase().includes(upper)||
             matchingIds.has(a.id.toString());
    });
    
    setListTitle("Resultados de búsqueda");
    setListAnimals(filtered);
    if(tab==="dashboard") setDashView("list");
  };

  const handleTabChange=newTab=>{setTab(newTab);if(newTab==="dashboard")setDashView("summary");if(newTab==="registro"){setPrefillId("");setPrefillAccion("INGRESO");setPrefillAnimal(null)}};
  const inputS={width:"100%",padding:"6px 8px",borderRadius:8,border:"1px solid var(--input)",background:"var(--card)",color:"var(--fg)",fontSize:12};

  return React.createElement("div",{style:{minHeight:"100vh",background:"var(--bg)",paddingBottom:80}},
    React.createElement(FarmHeader,{searchValue:search,onSearch:handleSearch,onNavigate:handleTabChange,activeTab:tab, isOnline, queueCount, syncing, showInstall:!!deferredPrompt, onInstall:handleInstallClick}),
    React.createElement("main",{style:{maxWidth:480,margin:"0 auto",padding:"16px 16px"}},
      tab==="dashboard"&&(loading?
        React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",paddingTop:80}},
          React.createElement("div",{style:{width:40,height:40,border:"4px solid var(--primary)",borderTopColor:"transparent",borderRadius:"50%"},className:"animate-spin"}),
          React.createElement("p",{style:{marginTop:12,fontSize:14,color:"var(--muted-fg)"}},"Sincronizando datos...")
        ):React.createElement(React.Fragment,null,
          dashView==="summary"&&React.createElement(React.Fragment,null,
            React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}},
              React.createElement("div",null,React.createElement("label",{style:{fontSize:9,fontWeight:700,color:"var(--muted-fg)",textTransform:"uppercase",letterSpacing:1}},"📍 Puesto"),React.createElement("select",{value:filterPuesto,onChange:e=>setFilterPuesto(e.target.value),style:inputS},React.createElement("option",{value:""},"Todos"),subpuestos.map(s=>React.createElement("option",{key:s,value:s},s)))),
              React.createElement("div",null,React.createElement("label",{style:{fontSize:9,fontWeight:700,color:"var(--muted-fg)",textTransform:"uppercase",letterSpacing:1}},"👩‍👦 Madre"),React.createElement("select",{value:filterMadre,onChange:e=>setFilterMadre(e.target.value),style:inputS},React.createElement("option",{value:""},"Todas"),madres.map(m=>React.createElement("option",{key:m,value:m},m))))
            ),
            (filterPuesto||filterMadre)&&React.createElement("button",{onClick:()=>{setFilterPuesto("");setFilterMadre("")},style:{fontSize:12,color:"var(--primary)",fontWeight:600,marginBottom:12}},"✕ Limpiar filtros"),
            React.createElement(DashboardView,{data:dashboardData,onPhaseClick:handlePhaseClick,onSubpuestoClick:handleSubpuestoClick,onPigletsClick:handlePigletsClick})
          ),
          dashView==="subpuestos"&&React.createElement(SubpuestoCards,{phase:currentPhase,animals:filteredInv.filter(a=>a.fase===currentPhase),onSelect:sub=>handleSubpuestoClick(currentPhase,sub),onSelectAll:()=>{setListTitle(currentPhase.replace(/_/g," "));setListAnimals(filteredInv.filter(a=>a.fase===currentPhase));setDashView("list")},onBack:()=>setDashView("summary"),onSubfaseClick:handleSubfaseClick}),
          dashView==="list"&&React.createElement(AnimalList,{title:listTitle,animals:listAnimals,onSelect:handleSelectAnimal,onBack:()=>{if(currentPhase)setDashView("subpuestos");else{setDashView("summary");setSearch("")}}}),
          dashView==="detail"&&selectedAnimal&&React.createElement(AnimalDetail,{animal:selectedAnimal,historial:historial,allAnimals:todosAnimales,onBack:()=>setDashView("list"),onAction:handleAction,onRefresh:()=>loadData(true)})
        )
      ),
      tab==="registro"&&React.createElement(RegistroForm,{inventario:inventario,fasesExtra:fasesExtra,prefillId:prefillId,prefillAccion:prefillAccion,prefillAnimal:prefillAnimal,historial:historial,onSuccess:()=>{handleTabChange("dashboard")}}),
      tab==="reportes"&&React.createElement(ReportsView,{historial:historial,search:search,onSelectAnimal:id=>{const a=todosAnimales.find(x=>x.id===id);if(a){setSelectedAnimal(a);setTab("dashboard");setDashView("detail")}}}),
      tab==="resumen"&&React.createElement(ResumenView,{historial:historial,search:search,onSelectAnimal:id=>{const a=todosAnimales.find(x=>x.id===id);if(a){setSelectedAnimal(a);setTab("dashboard");setDashView("detail")}}}),
      tab==="vacunas"&&React.createElement(VacunasView,{inventario:inventario,historial:historial,search:search,onRefresh:()=>loadData(true),onSelectAnimal:id=>{const a=todosAnimales.find(x=>x.id===id);if(a){setSelectedAnimal(a);setTab("dashboard");setDashView("detail")}}})
    ),
    React.createElement(BottomNav,{active:tab,onChange:handleTabChange})
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
